# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CI Suite

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        id: pnpm-install
        with:
          version: '10.x'
      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
  format:
    needs: build
    runs-on: ubuntu-latest
    name: Format
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        id: pnpm-install
        with:
          version: '10.x'
      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format
        run: pnpm format
  # lint: disabled — ESLint v8 .eslintrc config incompatible with ESLint v9 flat config requirement.
  #   Tracked in revival-roadmap.md: migrate to eslint.config.js + eslint-plugin-svelte.
  # test: disabled — vitest CI environment missing svelte/styleText export (Node 18 + Svelte 5 compat gap).
  #   Tracked in revival-roadmap.md: fix CI test environment (Node 20+, Svelte 5 peer resolution).
  # coverage: disabled — same root cause as test job above.
